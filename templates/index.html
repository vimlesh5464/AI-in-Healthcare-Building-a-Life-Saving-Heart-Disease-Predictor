<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
        .result { margin-top: 20px; font-size: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Heart Disease Prediction</h1>
        <form method="POST">
            <label>Age: <input type="number" name="age" required></label>
            <label>Sex (0=Female, 1=Male): <input type="number" name="sex" required></label>
            <label>Chest Pain Type (0-3): <input type="number" name="cp" required></label>
            <label>Resting BP: <input type="number" name="trestbps" required></label>
            <label>Cholesterol: <input type="number" name="chol" required></label>
            <label>Fasting Blood Sugar (0/1): <input type="number" name="fbs" required></label>
            <label>Resting ECG (0-2): <input type="number" name="restecg" required></label>
            <label>Max Heart Rate (thalach): <input type="number" name="thalach" required></label>
            <label>Exercise Induced Angina (0/1): <input type="number" name="exang" required></label>
            <label>Oldpeak: <input type="number" step="0.1" name="oldpeak" required></label>
            <label>Slope (0-2): <input type="number" name="slope" required></label>
            <label>Number of major vessels (0-3): <input type="number" name="ca" required></label>
            <label>Thal (1-3): <input type="number" name="thal" required></label>
            <button type="submit">Predict</button>
        </form>

        {% if prediction is not none %}
            <div class="result">
                Prediction (0 = No Disease, 1 = Disease): {{ prediction }}
            </div>
        {% endif %}
    </div>
</body>
</html>
